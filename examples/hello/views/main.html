<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>HelloWorld</title>
  </head>
  <body>
    <div class="app" id="root">
      <h1 id="title">Hello, htmlui!</h1>

      <p id="subtitle">
        A native desktop UI rendered from HTML and CSS. No browser engine. Pure
        C + SDL3.
      </p>

      <div class="row">
        <button id="btn-greet" class="btn btn-primary">Say Hello</button>
        <button id="btn-reset" class="btn btn-secondary">Reset</button>
      </div>

      <p id="status" class="status-text"></p>

      <div class="card">
        <h2>Enter your name</h2>
        <input id="name-input" type="text" placeholder="Your name..." />
      </div>
    </div>
  </body>
</html>
